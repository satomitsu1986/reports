<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BDX資料 | SATOMITSU REPORTS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+JP:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #151515;
      --surface-hi: #1d1b18;
      --border: rgba(255,255,255,0.07);
      --border-hi: rgba(201,169,110,0.36);
      --gold: #c9a96e;
      --gold-soft: rgba(201,169,110,0.07);
      --text-hi: #f2ede6;
      --text-mid: #8c857a;
      --text-lo: #464039;
      --radius-lg: 12px;
    }
    html {
      background: var(--bg);
      color: var(--text-hi);
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 70% 45% at 50% 0%, rgba(201,169,110,0.07), transparent 70%),
        linear-gradient(180deg, #0a0a0a 0%, #0d0c0b 52%, #080808 100%);
    }
    .page {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 84px 0 80px;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 44px;
      color: var(--text-mid);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back:hover { color: var(--gold); }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0.68;
    }
    .eyebrow::after {
      content: '';
      width: 34px;
      height: 1px;
      background: var(--gold);
      opacity: 0.5;
    }
    h1 {
      font-family: 'Cormorant Garamond', 'Noto Sans JP', serif;
      font-size: clamp(2.6rem, 7vw, 4.8rem);
      font-weight: 300;
      letter-spacing: 0.16em;
      line-height: 1;
      margin-bottom: 20px;
    }
    .lead {
      max-width: 650px;
      color: var(--text-mid);
      font-size: 0.88rem;
      line-height: 2;
      letter-spacing: 0.08em;
      margin-bottom: 48px;
    }
    .list { display: grid; gap: 14px; }
    .doc-link {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      min-height: 86px;
      padding: 22px 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, var(--surface-hi), var(--surface));
      color: inherit;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: border-color 0.35s, transform 0.35s, box-shadow 0.35s;
    }
    .doc-link::before {
      content: '';
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.35s;
    }
    .doc-link::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold-soft);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    .doc-link:hover {
      border-color: var(--border-hi);
      transform: translateY(-2px);
      box-shadow: 0 20px 54px rgba(0,0,0,0.48);
    }
    .doc-link:hover::before { opacity: 0.72; }
    .doc-link:hover::after { opacity: 1; }
    .number {
      position: relative;
      z-index: 1;
      color: var(--gold);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.55rem;
      opacity: 0.74;
    }
    .doc-main {
      position: relative;
      z-index: 1;
      min-width: 0;
    }
    .doc-label {
      display: block;
      color: var(--gold);
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.64;
      margin-bottom: 7px;
    }
    .doc-title {
      display: block;
      color: var(--text-hi);
      font-size: 0.98rem;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }
    .doc-desc {
      display: block;
      color: var(--text-mid);
      font-size: 0.78rem;
      line-height: 1.7;
      letter-spacing: 0.05em;
    }
    .arrow {
      position: relative;
      z-index: 1;
      width: 15px;
      height: 15px;
      color: var(--gold);
      opacity: 0.62;
      flex-shrink: 0;
    }
    footer {
      margin-top: 54px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--text-lo);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
    }
    @media (max-width: 640px) {
      .page { width: min(100% - 28px, 960px); padding: 56px 0 64px; }
      .back { margin-bottom: 34px; }
      .doc-link {
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 20px;
      }
      .number { display: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="../index.html">← SATOMITSU REPORTS</a>
    <p class="eyebrow">Ballet Dance Fitness</p>
    <h1>BDX資料</h1>
    <p class="lead">バレエ・ダンス・AIフィットネス領域の構想資料をまとめています。</p>

    <section class="list" aria-label="BDX資料一覧">
      <a class="doc-link" href="https://docs.google.com/document/d/1alMIInQtj4elXSbjH4C6RS0nUw1ahHpq/edit" target="_blank" rel="noopener noreferrer">
        <span class="number">01</span>
        <span class="doc-main">
          <span class="doc-label">Outsourcing Agreement · Ver.1.0</span>
          <span class="doc-title">BDX 業務委託契約書（Ver.1.0）</span>
          <span class="doc-desc">バレエ監修等の委託業務、契約条件、報酬規程および経費精算規程を定めた契約書。</span>
        </span>
        <svg class="arrow" viewBox="0 0 13 13" fill="none" aria-hidden="true"><path d="M1.5 11.5L11.5 1.5M11.5 1.5H4.5M11.5 1.5V8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </section>

    <footer>© 合同会社 nature · SATOMITSU REPORTS</footer>
  </main>
</body>
</html>
