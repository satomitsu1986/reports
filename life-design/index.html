<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人生設計 | SAT's Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+JP:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #171717;
      --surface-hi: #211f1d;
      --line: rgba(255,255,255,0.09);
      --gold: #d2ad6f;
      --mint: #7ddfc3;
      --coral: #ff8f70;
      --violet: #a99bff;
      --text: #f7f1e8;
      --muted: #9a9186;
      --low: #514a43;
      --radius: 16px;
    }
    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 12%, rgba(125,223,195,0.12), transparent 28%),
        radial-gradient(circle at 80% 4%, rgba(255,143,112,0.12), transparent 26%),
        radial-gradient(ellipse 70% 45% at 50% 0%, rgba(210,173,111,0.08), transparent 72%),
        linear-gradient(180deg, #0a0a0a 0%, #11100f 52%, #080808 100%);
    }
    .page {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 84px 0 80px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      color: var(--mint);
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--coral);
      box-shadow: 18px 0 0 var(--gold);
    }
    h1 {
      margin-bottom: 18px;
      font-family: 'Cormorant Garamond', 'Noto Sans JP', serif;
      font-size: clamp(2.6rem, 7vw, 4.9rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      line-height: 1.05;
    }
    .lead {
      max-width: 680px;
      margin-bottom: 44px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 2;
      letter-spacing: 0.07em;
    }
    .list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    .doc-card {
      min-height: 210px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 42%),
        linear-gradient(180deg, var(--surface-hi), var(--surface));
      color: inherit;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    .doc-card::before {
      content: '';
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: linear-gradient(90deg, var(--mint), var(--gold), var(--coral));
      opacity: 0.86;
    }
    .doc-card:hover {
      transform: translateY(-3px);
      border-color: rgba(210,173,111,0.36);
      box-shadow: 0 24px 60px rgba(0,0,0,0.42);
    }
    .doc-label {
      margin-bottom: 16px;
      color: var(--gold);
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .doc-title {
      margin-bottom: 12px;
      color: var(--text);
      font-size: 1.18rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      line-height: 1.55;
    }
    .doc-desc {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.9;
      letter-spacing: 0.05em;
    }
    .doc-action {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
      color: var(--mint);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
    }
    footer {
      margin-top: 54px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      color: var(--low);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-align: center;
      text-transform: uppercase;
    }
    @media (max-width: 720px) {
      .page { width: min(100% - 28px, 980px); padding: 56px 0 64px; }
      .list { grid-template-columns: 1fr; }
      .doc-card { min-height: auto; padding: 24px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <p class="eyebrow">Life Design</p>
    <h1>人生設計</h1>
    <p class="lead">人生の軸と日々の判断ルールを分けて管理するプロジェクト。</p>

    <section class="list" aria-label="人生設計資料一覧">
      <a class="doc-card" href="plan.html">
        <p class="doc-label">Life Plan · 2026</p>
        <h2 class="doc-title">人生設計書（2026年版）</h2>
        <p class="doc-desc">人生のテーマ、目的、価値観、在り方を整理した設計書。</p>
        <span class="doc-action">Open Document →</span>
      </a>

      <a class="doc-card" href="my-rules.html">
        <p class="doc-label">My Rules</p>
        <h2 class="doc-title">My ルール</h2>
        <p class="doc-desc">迷った時、感情が動いた時、人と関わる時の判断基準。</p>
        <span class="doc-action">Open Document →</span>
      </a>
    </section>

    <footer>© 合同会社 nature · SAT's Database</footer>
  </main>
</body>
</html>
