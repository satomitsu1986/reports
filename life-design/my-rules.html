<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My ルール | SAT's Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+JP:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #171717;
      --surface-hi: #211f1d;
      --line: rgba(255,255,255,0.09);
      --gold: #d2ad6f;
      --mint: #7ddfc3;
      --coral: #ff8f70;
      --violet: #a99bff;
      --text: #f7f1e8;
      --muted: #9a9186;
      --low: #514a43;
      --radius: 16px;
    }
    html { background: var(--bg); color: var(--text); font-family: 'Inter', 'Noto Sans JP', sans-serif; -webkit-font-smoothing: antialiased; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 10%, rgba(169,155,255,0.12), transparent 28%),
        radial-gradient(circle at 84% 6%, rgba(255,143,112,0.12), transparent 24%),
        linear-gradient(180deg, #0a0a0a 0%, #11100f 52%, #080808 100%);
    }
    .page { width: min(900px, calc(100% - 32px)); margin: 0 auto; padding: 84px 0 80px; }
    .eyebrow { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 22px; color: var(--violet); font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; }
    .eyebrow::before { content: ''; width: 10px; height: 10px; border-radius: 999px; background: var(--mint); box-shadow: 18px 0 0 var(--coral); }
    h1 { margin-bottom: 18px; font-family: 'Cormorant Garamond', 'Noto Sans JP', serif; font-size: clamp(2.6rem, 7vw, 4.8rem); font-weight: 300; letter-spacing: 0.12em; line-height: 1.08; }
    .lead { max-width: 680px; margin-bottom: 44px; color: var(--muted); font-size: 0.92rem; line-height: 2; letter-spacing: 0.07em; }
    .rules { display: grid; gap: 14px; list-style: none; counter-reset: rules; }
    .rules li {
      counter-increment: rules;
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 16px;
      align-items: start;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 44%),
        linear-gradient(180deg, var(--surface-hi), var(--surface));
      color: var(--text);
      font-size: 1rem;
      line-height: 1.9;
      letter-spacing: 0.05em;
      position: relative;
      overflow: hidden;
    }
    .rules li::before {
      content: counter(rules, decimal-leading-zero);
      color: var(--mint);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.75rem;
      line-height: 1.15;
    }
    .rules li::after {
      content: '';
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: linear-gradient(90deg, var(--violet), var(--mint), var(--coral));
      opacity: 0.86;
    }
    footer { margin-top: 54px; padding-top: 24px; border-top: 1px solid var(--line); color: var(--low); font-size: 10px; letter-spacing: 0.2em; text-align: center; text-transform: uppercase; }
    @media (max-width: 720px) {
      .page { width: min(100% - 28px, 900px); padding: 56px 0 64px; }
      .rules li { grid-template-columns: 1fr; gap: 8px; padding: 20px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <p class="eyebrow">My Rules</p>
    <h1>My ルール</h1>
    <p class="lead">迷った時、感情が動いた時、人と関わる時の判断基準。</p>

    <ol class="rules">
      <li>悩んだら、20年後の自分はどう助言するかを考える。</li>
      <li>人と関わる時は、勝手に解釈せず、相手の世界を教えてもらう。</li>
      <li>何かを与えたくなったら、自分が与えたいものではなく、相手にとって価値あるものを与える。</li>
      <li>関心の輪に意識が向いたら、影響の輪に意識を戻す。</li>
      <li>感情に流されそうになったら、感情を観察し、価値観で行動を選ぶ。</li>
    </ol>

    <footer>© 合同会社 nature · SAT's Database</footer>
  </main>
</body>
</html>
